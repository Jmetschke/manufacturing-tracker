services:
  - type: web
    name: manufacturing-tracker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_DATABASE_TOKEN
        sync: false
      - key: ACCESS_CODE
        sync: false
      - key: ADMIN_ACCESS_CODE
        sync: false
      - key: ACCESS_SESSION_SECRET
        sync: false
