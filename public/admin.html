<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select, button { box-sizing: border-box; font-size: 15px; margin: 4px; padding: 8px; }
    button { cursor: pointer; touch-action: manipulation; }
    table { border-collapse: collapse; width: 100%; margin-top: 15px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #eee; }
    .page-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .page-header h2 { margin: 0; }
    .screen-link {
      border: 1px solid #2364aa;
      background: #2364aa;
      color: #fff;
      text-decoration: none;
      padding: 9px 12px;
      font-size: 15px;
      line-height: 1.2;
    }
    .screen-link:visited { color: #fff; }
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #ccc; }
    .admin-tab-button { border: 0; border-bottom: 3px solid transparent; background: transparent; cursor: pointer; padding: 10px 14px; }
    .admin-tab-button.active { border-bottom-color: #2364aa; color: #123c69; font-weight: bold; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .controls input, .controls select { flex: 1 1 180px; min-width: 0; }
    .controls button { flex: 0 1 auto; }
    .edit-panel {
      display: none;
      border: 1px solid #ccc;
      background: #f8f8f8;
      margin: 16px 0;
      padding: 12px;
    }
    .edit-panel.active { display: block; }
    .edit-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .edit-grid input, .edit-grid select { flex: 1 1 180px; min-width: 0; }
    .edit-actions { margin-top: 8px; }
    .message { margin: 10px 0; }
    .message.error { color: #a00000; }
    .message.success { color: #176a2c; }
    .calendar-tools { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    .admin-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 1px;
      border: 1px solid #ccc;
      background: #ccc;
      overflow-x: auto;
    }
    .admin-day-name,
    .admin-calendar-day {
      background: #fff;
      padding: 8px;
    }
    .admin-day-name {
      background: #eee;
      font-weight: bold;
      text-align: center;
    }
    .admin-calendar-day {
      min-height: 120px;
    }
    .admin-event-list {
      display: grid;
      gap: 4px;
      margin-bottom: 8px;
    }
    .admin-event-item {
      background: #f3eefb;
      border-left: 3px solid #6d3bbd;
      padding: 5px 6px;
    }
    .admin-calendar-day.outside-month {
      background: #f5f5f5;
      color: #777;
    }
    .admin-calendar-date {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .admin-calendar-tasks {
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .admin-batch-list {
      display: grid;
      gap: 4px;
      margin-bottom: 8px;
    }
    .admin-batch-item {
      background: #f1f6fb;
      border-left: 3px solid #2364aa;
      padding: 5px 6px;
    }
    .admin-calendar-deliveries {
      display: grid;
      gap: 4px;
      margin-bottom: 8px;
    }
    .admin-calendar-delivery-heading {
      font-weight: bold;
      color: #176a2c;
    }
    .admin-calendar-delivery {
      background: #eef8f0;
      border-left: 3px solid #176a2c;
      padding: 5px 6px;
    }
    .batch-fields {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-width: 860px;
    }
    .event-fields {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-width: 980px;
    }
    .event-row {
      border: 1px solid #ccc;
      background: #fff;
      padding: 10px;
    }
    .event-row-grid {
      display: grid;
      grid-template-columns: 130px minmax(180px, 1fr) 90px minmax(160px, 1fr) minmax(160px, 1fr) auto;
      gap: 6px;
      align-items: end;
    }
    .event-field label,
    .batch-field label {
      display: block;
      font-weight: bold;
      margin: 0 4px 3px;
    }
    .event-field input,
    .event-row-grid input,
    .event-row-grid select,
    .event-field select {
      margin: 0;
      width: 100%;
    }
    .event-day-times {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .event-day-time-row {
      display: grid;
      grid-template-columns: 70px 120px 120px;
      gap: 6px;
      align-items: center;
    }
    .event-day-time-row input {
      margin: 0;
      width: 100%;
    }
    .batch-row {
      display: grid;
      grid-template-columns: 34px minmax(180px, 1fr) 110px auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .batch-order {
      font-weight: bold;
      text-align: right;
    }
    .batch-row input,
    .batch-row select {
      margin: 0;
      width: 100%;
    }
    .batch-units {
      max-width: 110px;
    }
    .admin-task-list {
      margin: 0 0 8px 20px;
      padding: 0;
    }
    .admin-task-list li {
      margin-bottom: 4px;
    }
    .schedule-task-section {
      margin-top: 10px;
    }
    .schedule-task-row {
      display: grid;
      grid-template-columns: 34px minmax(180px, 1fr) 90px repeat(3, auto);
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
      max-width: 860px;
    }
    .test-pickup-row {
      display: grid;
      grid-template-columns: 34px 110px minmax(220px, 1fr) auto;
      gap: 6px;
      align-items: start;
      margin-bottom: 6px;
      max-width: 860px;
    }
    .schedule-task-order {
      font-weight: bold;
      text-align: right;
    }
    .schedule-task-row input {
      margin: 0;
      width: 100%;
    }
    .schedule-task-days {
      max-width: 90px;
    }
    .test-pickup-row input,
    .test-pickup-row select {
      margin: 0;
      width: 100%;
    }
    .test-pickup-item-picker {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto;
      gap: 6px;
    }
    .test-pickup-selected-items {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      grid-column: 1 / -1;
      margin-top: 6px;
    }
    .test-pickup-selected-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #d8d8d2;
      background: #fff;
      padding: 4px 6px;
    }
    .admin-test-pickup-list {
      display: grid;
      gap: 4px;
      margin-bottom: 8px;
    }
    .admin-test-pickup {
      background: #fff7e6;
      border-left: 3px solid #b36b00;
      padding: 5px 6px;
    }
    .ordered-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .ordered-field label {
      display: block;
      font-weight: bold;
      margin: 0 0 4px;
    }
    .ordered-form input {
      width: 100%;
      margin: 0;
    }
    .ordered-items-field {
      grid-column: 1 / -1;
    }
    .ordered-item-rows {
      display: grid;
      gap: 6px;
    }
    .ordered-item-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 130px auto;
      gap: 6px;
      align-items: end;
    }
    .ordered-item-row input {
      width: 100%;
      margin: 0;
    }
    .ordered-actions {
      margin-bottom: 16px;
    }
    .summary-line {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      line-height: 1.4;
      margin: 10px 0;
    }
    .summary-line span {
      flex: 1 1 160px;
    }
    .request-order-form {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .request-order-form.active {
      display: grid;
    }
    .request-order-form label {
      display: block;
      font-weight: bold;
      margin: 0 0 4px;
    }
    .request-order-form input {
      width: 100%;
      margin: 0;
    }
    .admin-delivery-section {
      margin-top: 18px;
    }
    .mobile-stack {
      width: 100%;
    }
    #table { overflow-x: auto; width: 100%; }
    #adminExpectedDeliveries,
    #adminReceivedDeliveries { overflow-x: auto; width: 100%; }
    #adminOrderRequests { overflow-x: auto; width: 100%; }

    @media (max-width: 640px) {
      html { font-size: 18px; }
      body { padding: 16px; font-size: 18px; }
      h2 { font-size: 1.6rem; }
      .page-header { flex-direction: column; align-items: stretch; }
      .screen-link { display: block; text-align: center; font-size: 18px; padding: 14px 12px; }
      h3 { font-size: 1.25rem; }
      input, select, button { min-height: 52px; font-size: 18px; padding: 12px; }
      .admin-tabs, .controls, .edit-grid, .calendar-tools { flex-direction: column; gap: 10px; }
      .admin-tab-button { width: 100%; margin-left: 0; margin-right: 0; padding: 14px 12px; text-align: left; font-size: 18px; }
      .summary-line { display: block; }
      .summary-line span { display: block; margin-bottom: 4px; }
      .controls input, .controls select, .controls button,
      .edit-grid input, .edit-grid select, .edit-actions button,
      .calendar-tools input, .calendar-tools button { width: 100%; margin-left: 0; margin-right: 0; }
      .controls input, .controls select, .controls button,
      .edit-grid input, .edit-grid select,
      .calendar-tools input, .calendar-tools button { flex: none; }
      #table,
      #adminOrderRequests,
      #adminExpectedDeliveries,
      #adminReceivedDeliveries { overflow-x: visible; }
      .mobile-stack {
        min-width: 0;
        border: 0;
        background: transparent;
        font-size: 16px;
      }
      .mobile-stack thead,
      .mobile-stack .table-heading-row { display: none; }
      .mobile-stack tr {
        display: block;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        background: #fff;
      }
      .mobile-stack td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        border: 0;
        border-bottom: 1px solid #eee;
        padding: 10px;
      }
      .mobile-stack td:last-child { border-bottom: 0; }
      .mobile-stack td::before {
        content: attr(data-label);
        flex: 0 0 42%;
        font-weight: bold;
      }
      .mobile-stack td:empty::after { content: ""; }
      .mobile-stack input,
      .mobile-stack select,
      .mobile-stack button {
        width: 100%;
        margin: 0;
      }
      .mobile-stack input[type="checkbox"] {
        width: auto;
        min-height: 0;
      }
      th, td { padding: 10px; }
      .admin-calendar-grid { grid-template-columns: repeat(7, 160px); }
      .admin-day-name,
      .admin-calendar-day,
      .admin-batch-item { font-size: 16px; }
      .batch-row,
      .schedule-task-row,
      .test-pickup-row { grid-template-columns: 28px 1fr; }
      .test-pickup-item-picker { grid-template-columns: 1fr; }
      .ordered-item-row { grid-template-columns: 1fr; }
      .event-row-grid,
      .event-day-time-row { grid-template-columns: 1fr; }
      .batch-row button,
      .schedule-task-row button { width: auto; }
      .ordered-form { grid-template-columns: 1fr; }
      .ordered-actions button { width: 100%; margin-left: 0; margin-right: 0; }
      .request-order-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h2>Admin Dashboard</h2>
  <a class="screen-link" href="/">Production Tracker</a>
</div>

<div class="admin-tabs">
  <button class="admin-tab-button active" type="button" onclick="showAdminTab('entries')">Entries</button>
  <button class="admin-tab-button" type="button" onclick="showAdminTab('calendar')">Calendar</button>
  <button class="admin-tab-button" type="button" onclick="showAdminTab('ordered')">Ordered Items</button>
</div>

<div id="message" class="message"></div>

<section id="entriesPanel" class="admin-panel active">
  <div class="controls">
    <input type="date" id="from_date">
    <input type="date" id="to_date">
    <select id="employee_filter">
      <option value="">All Employees</option>
    </select>
    <select id="item_filter">
      <option value="">All Items</option>
    </select>
    <button onclick="loadReport()">Filter</button>
    <button onclick="exportCSV()">Export CSV</button>
  </div>

  <section id="editPanel" class="edit-panel">
    <h3>Edit Entry</h3>
    <input type="hidden" id="edit_log_id">
    <div class="edit-grid">
      <input type="date" id="edit_work_date">
      <select id="edit_employee"></select>
      <select id="edit_item"></select>
      <select id="edit_task"></select>
      <input type="number" id="edit_quantity" min="0" step="1" placeholder="Quantity">
      <input type="text" id="edit_time" placeholder="Time HH:MM:SS">
    </div>
    <div class="edit-actions">
      <button type="button" onclick="saveEntryEdit()">Save Changes</button>
      <button type="button" onclick="cancelEntryEdit()">Cancel</button>
    </div>
  </section>

  <div id="summary"></div>
  <div id="table"></div>
</section>

<section id="calendarPanel" class="admin-panel">
  <div class="calendar-tools">
    <button type="button" onclick="changeAdminCalendarMonth(-1)">Previous</button>
    <input type="month" id="calendar_month" onchange="loadAdminCalendar()">
    <button type="button" onclick="changeAdminCalendarMonth(1)">Next</button>
  </div>

  <div id="adminCalendar" class="admin-calendar-grid"></div>

  <section id="scheduleEditor" class="edit-panel schedule-editor">
    <h3>Edit Calendar Day</h3>
    <input type="hidden" id="schedule_edit_date">
    <div><b id="scheduleEditLabel"></b></div>
    <div class="event-fields">
      <div class="batch-field">
        <label>Events</label>
        <div id="eventRows"></div>
        <button type="button" onclick="addEventEntry()">Add Event</button>
      </div>
    </div>
    <div class="batch-fields">
      <div class="batch-field">
        <label>Production Batch - Hijnx</label>
        <div id="batchHijnxRows"></div>
        <button type="button" onclick="addBatchEntry('hijnx')">Add Hijnx Batch</button>
      </div>
      <div class="batch-field">
        <label>Production Batch - SB</label>
        <div id="batchSbRows"></div>
        <button type="button" onclick="addBatchEntry('sb')">Add SB Batch</button>
      </div>
    </div>
    <div class="schedule-task-section">
      <h4>Tasks</h4>
      <div id="scheduleTaskRows"></div>
      <button type="button" onclick="addScheduleTask()">Add Task</button>
      <h4>Test Pick Ups</h4>
      <div id="testPickupRows"></div>
      <button type="button" onclick="addTestPickup()">Add Test Pick Up</button>
    </div>
    <div class="edit-actions">
      <button type="button" onclick="saveScheduleDay()">Save Day</button>
      <button type="button" onclick="cancelScheduleEdit()">Cancel</button>
    </div>
  </section>
</section>

<section id="orderedPanel" class="admin-panel">
  <h3>Request Item</h3>
  <div class="ordered-form">
    <div class="ordered-field">
      <label for="admin_request_date">Date</label>
      <input type="date" id="admin_request_date" required>
    </div>
    <div class="ordered-field">
      <label for="admin_requester_name">Name</label>
      <input type="text" id="admin_requester_name" required>
    </div>
    <div class="ordered-field">
      <label for="admin_request_department">Department</label>
      <input type="text" id="admin_request_department">
    </div>
    <div class="ordered-field">
      <label for="admin_request_item_needed">Item Needed</label>
      <input type="text" id="admin_request_item_needed" required>
    </div>
    <div class="ordered-field">
      <label for="admin_request_qty_needed">QTY Needed</label>
      <input type="number" id="admin_request_qty_needed" min="1" step="1" required>
    </div>
    <div class="ordered-field">
      <label for="admin_request_suggested_retailer">Suggested Retailer</label>
      <input type="text" id="admin_request_suggested_retailer">
    </div>
  </div>
  <div class="ordered-actions">
    <button type="button" onclick="saveAdminOrderRequest()">Submit Request</button>
  </div>

  <h3>Item Requests</h3>
  <div id="adminOrderRequests"></div>

  <h3>Add Ordered Item</h3>
  <div class="ordered-form">
    <div class="ordered-field">
      <label for="ordered_date_ordered">Date Ordered</label>
      <input type="date" id="ordered_date_ordered">
    </div>
    <div class="ordered-field">
      <label for="ordered_expected_delivery_date">Expected Delivery Date</label>
      <input type="date" id="ordered_expected_delivery_date">
    </div>
    <div class="ordered-field">
      <label for="ordered_item_supplier">Item Supplier</label>
      <input type="text" id="ordered_item_supplier">
    </div>
    <div class="ordered-field">
      <label for="ordered_department">Department</label>
      <input type="text" id="ordered_department">
    </div>
    <div class="ordered-field ordered-items-field">
      <label>Ordered Items</label>
      <div id="orderedItemRows" class="ordered-item-rows"></div>
      <button type="button" onclick="addOrderedItemRow()">Add Another Item</button>
    </div>
  </div>
  <div class="ordered-actions">
    <button type="button" onclick="saveOrderedItem()">Add Ordered Delivery</button>
  </div>

  <div class="admin-delivery-section">
    <h3>Expected Deliveries</h3>
    <div id="adminExpectedDeliveries"></div>
  </div>

  <div class="admin-delivery-section">
    <h3>Received Deliveries</h3>
    <h3>Manual Received Item</h3>
    <div class="ordered-form">
      <div class="ordered-field">
        <label for="admin_manual_received_date_ordered">Date Ordered</label>
        <input type="date" id="admin_manual_received_date_ordered" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_expected_delivery_date">Expected Delivery</label>
        <input type="date" id="admin_manual_received_expected_delivery_date" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_item_name">Item Name</label>
        <input type="text" id="admin_manual_received_item_name" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_package_qty">Package QTY</label>
        <input type="number" id="admin_manual_received_package_qty" min="0" step="1" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_units_per_package">Units Per Package</label>
        <input type="number" id="admin_manual_received_units_per_package" min="0" step="1">
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_item_supplier">Retailer/Supplier</label>
        <input type="text" id="admin_manual_received_item_supplier" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_department">Department</label>
        <input type="text" id="admin_manual_received_department" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_date">Received Date</label>
        <input type="date" id="admin_manual_received_date" required>
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_time">Received Time</label>
        <input type="text" id="admin_manual_received_time" placeholder="00:00" inputmode="numeric" maxlength="5">
      </div>
      <div class="ordered-field">
        <label for="admin_manual_received_location">Received Location</label>
        <input type="text" id="admin_manual_received_location" required>
      </div>
    </div>
    <div class="ordered-actions">
      <button type="button" onclick="saveAdminManualReceivedItem()">Add Received Item</button>
    </div>
    <div id="adminReceivedDeliveries"></div>
  </div>
</section>

<script src="employees.js"></script>
<script src="admin.js"></script>

</body>
</html>
