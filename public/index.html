<!DOCTYPE html>
<html>
<head>
  <title>Production Tracker</title>
</head>
<body>

<h2>Production Tracker</h2>

<input type="text" id="employee" placeholder="Employee Name">
<input type="date" id="work_date">
<select id="item"></select>
<select id="task"></select>
<input type="number" id="qty" placeholder="Quantity">

<br><br>

<h3>Timer: <span id="timer">00:00:00</span></h3>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="saveQuantity()">Save Qty</button>

<script src="app.js"></script>

</body>
</html>
