<!DOCTYPE html>
<html>
<head>
  <title>Production Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      color: #202124;
      background: #f7f7f4;
    }

    h2 {
      margin-top: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      border-bottom: 1px solid #d4d4ce;
    }

    .tab-button {
      border: 0;
      border-bottom: 3px solid transparent;
      padding: 10px 14px;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
    }

    .tab-button.active {
      border-bottom-color: #2364aa;
      color: #123c69;
      font-weight: bold;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    input,
    select,
    button {
      box-sizing: border-box;
      font-size: 15px;
      margin: 4px;
      padding: 8px;
    }

    button {
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
    }

    th,
    td {
      border: 1px solid #d8d8d2;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #ecece6;
    }

    .calc-table input,
    .calc-table select {
      box-sizing: border-box;
      width: 100%;
      margin: 0;
    }

    .calc-total {
      margin-top: 16px;
      font-size: 22px;
      font-weight: bold;
    }

    .saved-entries {
      margin-top: 24px;
    }

    #savedEntries {
      overflow-x: auto;
      width: 100%;
    }

    .saved-entries h3 {
      margin-bottom: 8px;
    }

    .empty-entries {
      color: #666;
      margin: 8px 4px;
    }

    .entry-fields,
    .timer-actions,
    .calculator-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .entry-fields input,
    .entry-fields select {
      flex: 1 1 180px;
      min-width: 0;
    }

    .timer-actions button,
    .calculator-actions button {
      flex: 0 1 auto;
    }

    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .tabs,
      .entry-fields,
      .timer-actions,
      .calculator-actions {
        flex-direction: column;
      }

      .tab-button,
      .entry-fields input,
      .entry-fields select,
      .timer-actions button,
      .calculator-actions button {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }

      table {
        min-width: 640px;
      }
    }
  </style>
</head>
<body>

<h2>Production Tracker</h2>

<div class="tabs">
  <button class="tab-button active" type="button" onclick="showTab('tracker')">Time Entry</button>
  <button class="tab-button" type="button" onclick="showTab('calculator')">Qty Calculator</button>
</div>

<section id="trackerTab" class="tab-panel active">
  <div class="entry-fields">
    <select id="employee">
      <option value="">Employee Name</option>
    </select>
    <input type="date" id="work_date">
    <select id="item"></select>
    <select id="task"></select>
    <input type="number" id="qty" placeholder="Quantity">
  </div>

  <h3>Timer: <span id="timer">00:00:00</span></h3>

  <div class="timer-actions">
    <button onclick="startTimer()">Start</button>
    <button id="pauseBtn" onclick="pauseTimer()">Pause</button>
    <button onclick="stopTimer()">Stop</button>
    <button id="saveBtn" onclick="saveQuantity()">Save Qty</button>
  </div>

  <div class="saved-entries">
    <h3>Saved Entries</h3>
    <div id="savedEntries"></div>
  </div>
</section>

<section id="calculatorTab" class="tab-panel">
  <div class="calculator-actions">
    <button type="button" onclick="addCalcRow()">Add Row</button>
    <button type="button" onclick="clearCalculator()">Clear</button>
    <button type="button" onclick="copyCalcTotalToQty()">Fill Time Entry Qty</button>
  </div>

  <div class="table-wrap">
    <table class="calc-table">
      <thead>
        <tr>
          <th>Bulk Type</th>
          <th># of Bulk Type</th>
          <th>Calculated Qty</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="calcRows"></tbody>
    </table>
  </div>

  <datalist id="bulkCountOptions">
    <option value="40">
    <option value="112">
  </datalist>

  <div class="calc-total">Total Qty: <span id="calcGrandTotal">0</span></div>
</section>

<script src="employees.js"></script>
<script src="app.js"></script>

</body>
</html>
