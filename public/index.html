<!DOCTYPE html>
<html>
<head>
  <title>Production Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      color: #202124;
      background: #f7f7f4;
    }

    h2 {
      margin-top: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      border-bottom: 1px solid #d4d4ce;
    }

    .tab-button {
      border: 0;
      border-bottom: 3px solid transparent;
      padding: 10px 14px;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
    }

    .tab-button.active {
      border-bottom-color: #2364aa;
      color: #123c69;
      font-weight: bold;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    input,
    select,
    button {
      box-sizing: border-box;
      font-size: 15px;
      margin: 4px;
      padding: 8px;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
    }

    th,
    td {
      border: 1px solid #d8d8d2;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #ecece6;
    }

    .calc-table input,
    .calc-table select {
      box-sizing: border-box;
      width: 100%;
      margin: 0;
    }

    .calc-total {
      margin-top: 16px;
      font-size: 22px;
      font-weight: bold;
    }

    .schedule-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .schedule-header h3 {
      margin: 0;
    }

    .schedule-range {
      color: #555;
      font-size: 14px;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 1px;
      overflow-x: auto;
      border: 1px solid #d8d8d2;
      background: #d8d8d2;
    }

    .schedule-day-name,
    .schedule-cell {
      background: #fff;
      min-height: 110px;
      padding: 8px;
    }

    .schedule-day-name {
      min-height: auto;
      background: #ecece6;
      font-weight: bold;
      text-align: center;
    }

    .schedule-date {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .schedule-tasks {
      line-height: 1.35;
    }

    .schedule-batches {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
    }

    .schedule-batch {
      background: #eef5fb;
      border-left: 3px solid #2364aa;
      padding: 5px 6px;
    }

    .calendar-deliveries {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
    }

    .calendar-delivery-heading {
      font-weight: bold;
      color: #176a2c;
    }

    .calendar-delivery {
      background: #eef8f0;
      border-left: 3px solid #176a2c;
      padding: 5px 6px;
    }

    .schedule-task-list {
      margin: 0 0 0 20px;
      padding: 0;
    }

    .schedule-task-list li {
      margin-bottom: 4px;
    }

    .test-pickup-list {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
    }

    .test-pickup {
      background: #fff7e6;
      border-left: 3px solid #b36b00;
      padding: 5px 6px;
    }

    .weekly-tasks {
      margin-top: 18px;
    }

    .weekly-task-list {
      display: grid;
      gap: 8px;
    }

    .weekly-task-item {
      border: 1px solid #d8d8d2;
      background: #fff;
      padding: 10px;
    }

    .weekly-task-date {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .saved-entries {
      margin-top: 24px;
    }

    #savedEntries {
      overflow-x: auto;
      width: 100%;
    }

    .saved-entries h3 {
      margin-bottom: 8px;
    }

    .empty-entries {
      color: #666;
      margin: 8px 4px;
    }

    .entry-fields,
    .timer-actions,
    .calculator-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .entry-fields input,
    .entry-fields select {
      flex: 1 1 180px;
      min-width: 0;
    }

    .timer-actions button,
    .calculator-actions button {
      flex: 0 1 auto;
    }

    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    .mobile-stack {
      width: 100%;
    }

    .deliveries-section {
      margin-top: 18px;
    }

    .request-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .request-field label {
      display: block;
      font-weight: bold;
      margin: 0 0 4px;
    }

    .request-field input {
      width: 100%;
      margin: 0;
    }

    .request-actions {
      margin-bottom: 18px;
    }

    .delivery-card {
      border: 1px solid #d8d8d2;
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
    }

    .delivery-card.received {
      border-left: 4px solid #176a2c;
    }

    .delivery-card.request {
      border-left: 4px solid #2364aa;
    }

    .delivery-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .delivery-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 6px 12px;
      margin-bottom: 8px;
    }

    .receive-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .receive-row input {
      flex: 1 1 180px;
      min-width: 0;
    }

    .receive-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .receive-toggle input {
      margin: 0;
    }

    @media (max-width: 640px) {
      html {
        font-size: 18px;
      }

      body {
        padding: 16px;
        font-size: 18px;
      }

      h2 {
        font-size: 1.6rem;
      }

      h3 {
        font-size: 1.25rem;
      }

      input,
      select,
      button {
        min-height: 52px;
        font-size: 18px;
        padding: 12px;
      }

      .tabs,
      .entry-fields,
      .timer-actions,
      .calculator-actions {
        flex-direction: column;
        gap: 10px;
      }

      .tab-button,
      .entry-fields input,
      .entry-fields select,
      .timer-actions button,
      .calculator-actions button,
      .request-actions button {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }

      .entry-fields input,
      .entry-fields select,
      .timer-actions button,
      .calculator-actions button {
        flex: none;
      }

      .tab-button {
        padding: 14px 12px;
        text-align: left;
      }

      .request-form,
      .delivery-details {
        grid-template-columns: 1fr;
      }

      .table-wrap,
      #savedEntries {
        overflow-x: visible;
      }

      .mobile-stack {
        min-width: 0;
        border: 0;
        background: transparent;
        font-size: 16px;
      }

      .mobile-stack thead {
        display: none;
      }

      .mobile-stack tr {
        display: block;
        margin-bottom: 10px;
        border: 1px solid #d8d8d2;
        background: #fff;
      }

      .mobile-stack td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        border: 0;
        border-bottom: 1px solid #ecece6;
        padding: 10px;
      }

      .mobile-stack td:last-child {
        border-bottom: 0;
      }

      .mobile-stack td::before {
        content: attr(data-label);
        flex: 0 0 42%;
        font-weight: bold;
      }

      .mobile-stack td:empty::after {
        content: "";
      }

      th,
      td {
        padding: 10px;
      }

      .mobile-stack input,
      .mobile-stack select,
      .mobile-stack button {
        width: 100%;
        margin: 0;
      }

      .mobile-stack input[type="checkbox"],
      .receive-toggle input {
        width: auto;
        min-height: 0;
      }

      .calc-total {
        font-size: 1.4rem;
      }

      .weekly-task-item,
      .schedule-cell,
      .delivery-card {
        font-size: 16px;
      }

      .schedule-grid {
        grid-template-columns: repeat(7, 160px);
      }

      .receive-row {
        flex-direction: column;
        align-items: stretch;
      }

      .receive-row input,
      .receive-row button {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }
    }
  </style>
</head>
<body>

<h2>Production Tracker</h2>

<div class="tabs">
  <button class="tab-button active" type="button" onclick="showTab('tracker')">Time Entry</button>
  <button class="tab-button" type="button" onclick="showTab('calculator')">Qty Calculator</button>
  <button class="tab-button" type="button" onclick="showTab('schedule')">Schedule</button>
  <button class="tab-button" type="button" onclick="showTab('ordered')">Ordered Items</button>
</div>

<section id="trackerTab" class="tab-panel active">
  <div class="entry-fields">
    <select id="employee">
      <option value="">Employee Name</option>
    </select>
    <input type="date" id="work_date">
    <select id="item"></select>
    <select id="task"></select>
    <input type="number" id="qty" placeholder="Quantity">
  </div>

  <h3>Timer: <span id="timer">00:00:00</span></h3>

  <div class="timer-actions">
    <button type="button" onclick="startTimer()">Start</button>
    <button type="button" id="pauseBtn" onclick="pauseTimer()">Pause</button>
    <button type="button" onclick="stopTimer()">Stop</button>
    <button type="button" id="saveBtn" onclick="saveQuantity()">Save Qty</button>
  </div>

  <div class="saved-entries">
    <h3>Saved Entries</h3>
    <div id="savedEntries"></div>
  </div>
</section>

<section id="calculatorTab" class="tab-panel">
  <div class="calculator-actions">
    <button type="button" onclick="addCalcRow()">Add Row</button>
    <button type="button" onclick="clearCalculator()">Clear</button>
    <button type="button" onclick="copyCalcTotalToQty()">Fill Time Entry Qty</button>
  </div>

  <div class="table-wrap">
    <table class="calc-table mobile-stack">
      <thead>
        <tr>
          <th>Bulk Type</th>
          <th># of Bulk Type</th>
          <th>Calculated Qty</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="calcRows"></tbody>
    </table>
  </div>

  <datalist id="bulkCountOptions">
    <option value="40">
    <option value="112">
  </datalist>

  <div class="calc-total">Total Qty: <span id="calcGrandTotal">0</span></div>
</section>

<section id="scheduleTab" class="tab-panel">
  <div class="schedule-header">
    <h3>Two Week Schedule</h3>
    <div id="scheduleRange" class="schedule-range"></div>
  </div>
  <div id="scheduleCalendar" class="schedule-grid"></div>

  <div class="weekly-tasks">
    <h3>This Week's Tasks</h3>
    <div id="weeklyTasks" class="weekly-task-list"></div>
  </div>
</section>

<section id="orderedTab" class="tab-panel">
  <div class="deliveries-section">
    <h3>Request Item</h3>
    <div class="request-form">
      <div class="request-field">
        <label for="request_date">Date</label>
        <input type="date" id="request_date" required>
      </div>
      <div class="request-field">
        <label for="requester_name">Name</label>
        <input type="text" id="requester_name" required>
      </div>
      <div class="request-field">
        <label for="request_department">Department</label>
        <input type="text" id="request_department">
      </div>
      <div class="request-field">
        <label for="request_item_needed">Item Needed</label>
        <input type="text" id="request_item_needed" required>
      </div>
      <div class="request-field">
        <label for="request_qty_needed">QTY Needed</label>
        <input type="number" id="request_qty_needed" min="1" step="1" required>
      </div>
      <div class="request-field">
        <label for="request_suggested_retailer">Suggested Retailer</label>
        <input type="text" id="request_suggested_retailer">
      </div>
    </div>
    <div class="request-actions">
      <button type="button" onclick="saveOrderRequest()">Submit Request</button>
    </div>
  </div>

  <div class="deliveries-section">
    <h3>Item Requests</h3>
    <div id="orderRequests"></div>
  </div>

  <div class="deliveries-section">
    <h3>Expected Deliveries</h3>
    <div id="expectedDeliveries"></div>
  </div>

  <div class="deliveries-section">
    <h3>Received Deliveries</h3>
    <div id="receivedDeliveries"></div>
  </div>
</section>

<script src="employees.js"></script>
<script src="app.js"></script>

</body>
</html>
